<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow p-4" style="width: 400px; border-radius: 15px;">
            
            <h2 class="text-center mb-4">Cadastro</h2>

            <form id="formulario">

                <div class="mb-3">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-control" placeholder="Digite seu nome">
                    <div id="erroNome" class="text-danger small"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Digite seu email">
                    <div id="erroEmail" class="text-danger small"></div>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
                    <div id="erroSenha" class="text-danger small"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Enviar</button>

            </form>

        </div>

    </div>

    <div class="container mt-3 text-center">
        <div id="resultado"></div>
    </div>

</body>
</html>
